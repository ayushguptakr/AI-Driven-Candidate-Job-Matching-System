<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TalentMatch AI — Logo Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030014;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 48px;
      padding: 60px 24px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .sizes {
      display: flex;
      align-items: center;
      gap: 48px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .size-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .size-label span {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }
    .logo-with-text {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 32px;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(168, 85, 247, 0.2);
      background: rgba(168, 85, 247, 0.05);
      color: #c4b5fd;
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="badge">✨ Animated SVG Logo Preview</div>
  <h1>TalentMatch AI</h1>

  <div class="sizes">
    <div class="size-label">
      <img src="/logo-animated.svg" width="36" height="36" alt="Logo 36px" />
      <span>36px</span>
    </div>
    <div class="size-label">
      <img src="/logo-animated.svg" width="64" height="64" alt="Logo 64px" />
      <span>64px</span>
    </div>
    <div class="size-label">
      <img src="/logo-animated.svg" width="120" height="120" alt="Logo 120px" />
      <span>120px</span>
    </div>
    <div class="size-label">
      <img src="/logo-animated.svg" width="200" height="200" alt="Logo 200px" />
      <span>200px</span>
    </div>
  </div>

  <div class="logo-with-text">
    <img src="/logo-animated.svg" width="48" height="48" alt="Logo" />
    <span class="logo-text">TalentMatch AI</span>
  </div>
</body>
</html>
